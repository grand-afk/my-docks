<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Docks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
:root {
  --red:#E8102B; --dark:#0f0f0f; --card:#1a1a1a; --card2:#222;
  --border:#2a2a2a; --border2:#333; --text:#f0f0f0;
  --green:#22c55e; --amber:#f59e0b; --blue:#60a5fa; --purple:#a78bfa;
  --dim:#777; --muted:#444;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { background:var(--dark); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; padding-bottom:60px; }

header { background:var(--red); padding:12px 12px 12px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; gap:8px; }
header h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(1.2rem,4.5vw,2rem); color:#fff; white-space:nowrap; min-width:0; overflow:hidden; text-overflow:ellipsis; }
.header-btns { display:flex; gap:6px; flex-shrink:0; }
.hbtn { background:rgba(255,255,255,0.18); border:1.5px solid rgba(255,255,255,0.4); color:#fff; font-family:'DM Mono',monospace; font-size:clamp(0.78rem,2.5vw,1rem); padding:8px 10px; border-radius:8px; cursor:pointer; transition:background 0.15s; white-space:nowrap; }
.hbtn:hover { background:rgba(255,255,255,0.32); }
.hbtn:disabled { opacity:0.45; cursor:not-allowed; }
.hbtn.active { background:#fff; color:var(--red); font-weight:500; }

#status-bar { text-align:center; font-size:clamp(0.95rem,3vw,1.1rem); color:#bbb; padding:10px 16px 4px; letter-spacing:0.03em; min-height:36px; }

#edit-banner { display:none; background:#1c1400; border-bottom:1px solid #3a2800; text-align:center; padding:12px 16px; font-size:clamp(0.88rem,2.8vw,1rem); color:var(--amber); }
#edit-banner.show { display:block; }

#search-panel { display:none; background:#111; border-bottom:2px solid var(--red); padding:16px; }
#search-panel.open { display:block; }
.search-wrap { display:flex; gap:8px; margin-bottom:10px; }
#search-input { flex:1; background:var(--card2); border:1.5px solid var(--border2); color:var(--text); font-family:'DM Mono',monospace; font-size:clamp(1rem,3.2vw,1.15rem); padding:12px 16px; border-radius:8px; outline:none; transition:border-color 0.15s; }
#search-input:focus { border-color:var(--red); }
#search-btn { background:var(--red); border:none; color:#fff; font-family:'DM Mono',monospace; font-size:clamp(0.9rem,2.8vw,1rem); padding:12px 20px; border-radius:8px; cursor:pointer; white-space:nowrap; }
#search-btn:disabled { opacity:0.5; cursor:not-allowed; }
#search-msg { font-size:clamp(0.85rem,2.6vw,0.95rem); color:var(--dim); padding:4px 2px 8px; min-height:24px; }
#search-results { display:flex; flex-direction:column; gap:8px; max-height:55vh; overflow-y:auto; }

.result-card { background:var(--card2); border:1.5px solid var(--border2); border-radius:10px; overflow:hidden; }
.result-header { padding:12px 16px 10px; display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.result-name { font-family:'Syne',sans-serif; font-weight:700; font-size:clamp(1.1rem,3.8vw,1.3rem); color:#fff; line-height:1.2; }
.result-area { font-size:clamp(0.75rem,2.2vw,0.82rem); color:var(--dim); text-transform:uppercase; letter-spacing:0.06em; margin-top:3px; }
.pin-btn { background:var(--red); border:none; color:#fff; font-family:'DM Mono',monospace; font-size:clamp(0.82rem,2.5vw,0.9rem); padding:8px 14px; border-radius:6px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.pin-btn:disabled { background:#2a2a2a; color:var(--dim); cursor:default; }
.result-stats { display:flex; border-top:1px solid var(--border); }
.result-stat { flex:1; padding:12px 6px; text-align:center; border-right:1px solid var(--border); }
.result-stat:last-child { border-right:none; }
.result-stat-val { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(1.8rem,6vw,2.2rem); display:block; line-height:1; margin-bottom:4px; }
.result-stat-lbl { font-size:clamp(0.7rem,2vw,0.78rem); color:var(--dim); text-transform:uppercase; letter-spacing:0.05em; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(100%,380px),1fr)); gap:14px; padding:14px; max-width:900px; margin:0 auto; }

.card { background:var(--card); border:1.5px solid var(--border); border-radius:14px; overflow:hidden; position:relative; transition:border-color 0.2s; }
.card.edit-mode { border-color:#3a3a3a; animation:wobble 0.45s ease-in-out infinite alternate; }
@keyframes wobble { from{transform:rotate(-0.5deg)} to{transform:rotate(0.5deg)} }
.card.dragging { opacity:0.35; transform:scale(0.97); border:1.5px dashed var(--amber) !important; animation:none !important; }
.card.drag-over { border-color:var(--amber) !important; background:#1e1a0f; }

.drag-handle { display:none; position:absolute; top:50%; left:10px; transform:translateY(-50%); color:var(--muted); cursor:grab; padding:8px 5px; font-size:1.3rem; z-index:4; touch-action:none; align-items:center; line-height:1; }
.drag-handle:active { cursor:grabbing; color:var(--amber); }
.card.edit-mode .drag-handle { display:flex; }
.card.edit-mode .card-header { padding-left:38px; }

.remove-btn { display:none; position:absolute; top:-9px; right:-9px; width:30px; height:30px; background:var(--red); color:#fff; border:2.5px solid var(--dark); border-radius:50%; font-size:0.9rem; cursor:pointer; align-items:center; justify-content:center; z-index:5; font-family:sans-serif; line-height:1; }
.card.edit-mode .remove-btn { display:flex; }

.card-header { padding:15px 16px 11px; border-bottom:1px solid var(--border); }
.station-name { font-family:'Syne',sans-serif; font-weight:700; font-size:clamp(1.2rem,4vw,1.5rem); line-height:1.2; color:#fff; margin-bottom:3px; }
.station-area { font-size:clamp(0.75rem,2.2vw,0.85rem); color:var(--dim); letter-spacing:0.06em; text-transform:uppercase; }

.stats-row { display:flex; }
.stat { flex:1; padding:16px 8px; text-align:center; border-right:1px solid var(--border); }
.stat:last-child { border-right:none; }
.stat-value { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2.4rem,8vw,3.2rem); line-height:1; display:block; margin-bottom:6px; }
.stat-label { font-size:clamp(0.72rem,2.2vw,0.82rem); color:var(--dim); letter-spacing:0.06em; text-transform:uppercase; line-height:1.4; }

.bikes { color:var(--green); }
.bikes.warn { color:var(--amber); }
.bikes.empty { color:var(--red); }
.ebikes { color:var(--purple); }
.docks { color:var(--blue); }
.docks.full { color:var(--red); }
.loading-val { color:#3a3a3a; animation:pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.9} }

.actions { border-top:1px solid var(--border); }
.action-btn { display:flex; width:100%; padding:18px 10px; text-decoration:none; font-family:'Syne',sans-serif; font-weight:700; font-size:clamp(1.15rem,3.8vw,1.35rem); color:var(--green); transition:color 0.15s,background 0.15s; align-items:center; justify-content:center; gap:10px; }
.action-btn:hover { background:rgba(34,197,94,0.08); color:#4ade80; }

#tfl-link-wrap { text-align:center; padding:20px 16px 8px; }
#tfl-link { display:inline-flex; align-items:center; gap:8px; background:#1a1a1a; border:1.5px solid #2a2a2a; color:#888; text-decoration:none; font-family:'DM Mono',monospace; font-size:clamp(0.85rem,2.6vw,0.95rem); padding:11px 20px; border-radius:9px; transition:color 0.15s,border-color 0.15s; }
#tfl-link:hover { color:var(--red); border-color:var(--red); }

#empty-state { display:none; text-align:center; padding:50px 20px; color:var(--dim); }
#empty-state.show { display:block; }
#empty-state p { font-size:clamp(1rem,3vw,1.1rem); margin-bottom:8px; }
#empty-state small { font-size:clamp(0.82rem,2.5vw,0.9rem); }

footer { text-align:center; font-size:0.62rem; color:#2a2a2a; padding:12px 16px 0; letter-spacing:0.04em; }
</style>
</head>
<body>

<header>
  <h1>🚲 My Docks</h1>
  <div class="header-btns">
    <button class="hbtn" id="search-toggle-btn" onclick="toggleSearch()">🔍 Search</button>
    <button class="hbtn" id="edit-btn" onclick="toggleEdit()">✏️ Edit</button>
    <button class="hbtn" id="refresh-btn" onclick="loadAll()">↺</button>
  </div>
</header>

<div id="edit-banner">✏️ Tap ✕ to remove · Drag ⠿ to reorder · Use Search to add</div>

<div id="search-panel">
  <div class="search-wrap">
    <input id="search-input" type="text" placeholder="Street, area or station name…"
      autocomplete="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button id="search-btn" onclick="doSearch()">Go</button>
  </div>
  <div id="search-msg"></div>
  <div id="search-results"></div>
</div>

<div id="status-bar"></div>

<div id="empty-state">
  <p>No favourite stations yet.</p>
  <small>Tap 🔍 Search to find and save stations.</small>
</div>

<div class="grid" id="grid"></div>

<div id="tfl-link-wrap">
  <a id="tfl-link" href="https://tfl.gov.uk/modes/cycling/santander-cycles/find-a-docking-station" target="_blank">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    TfL Santander Cycles Map
  </a>
</div>

<footer>TfL Open Data · Favourites saved in your browser</footer>

<script>
var DEFAULTS = [
  { id: 175, label: "Appold Street",         area: "250 Bishopsgate",          lat: 51.52174, lng: -0.08112 },
  { id: 122, label: "Norton Folgate",        area: "Bishopsgate / Shoreditch", lat: 51.52111, lng: -0.07887 },
  { id:  84, label: "Breams Buildings",      area: "Chancery Lane",            lat: 51.51594, lng: -0.11178 },
  { id:  54, label: "Golden Lane",           area: "Silk Street / Barbican",   lat: 51.52175, lng: -0.09448 },
  { id:  78, label: "Sadlers Sports Centre", area: "Goswell Road / Finsbury",  lat: 51.52487, lng: -0.09949 },
  { id:  75, label: "Torrens Street",        area: "Angel / Islington",        lat: 51.53220, lng: -0.10548 },
  { id:  93, label: "Cloudesley Road",       area: "Angel / Upper Street",     lat: 51.53441, lng: -0.10903 }
];

var API_SEARCH = "https://api.tfl.gov.uk/BikePoint/Search?query=";
var API_SINGLE = "https://api.tfl.gov.uk/BikePoint/BikePoints_";
var editMode = false;
var searchOpen = false;

// Favourites
function getFavourites() {
  try { var s = localStorage.getItem("santander_favs"); if (s) return JSON.parse(s); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function saveFavourites(list) { try { localStorage.setItem("santander_favs", JSON.stringify(list)); } catch(e) {} }
function isFav(id) { return getFavourites().some(function(s){ return s.id === id; }); }
function addFav(station) { var favs = getFavourites(); if (!isFav(station.id)) { favs.push(station); saveFavourites(favs); } }
function removeFav(id) { saveFavourites(getFavourites().filter(function(s){ return s.id !== id; })); }

// Helpers
function cycleUrl(lat, lng) {
  var ios = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (ios) return "maps://?daddr=" + lat + "," + lng + "&dirflg=c";
  return "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng + "&travelmode=bicycling";
}

function bikeClass(n) {
  if (n == null) return "";
  if (n === 0) return "bikes empty";
  if (n <= 3) return "bikes warn";
  return "bikes";
}
function dockClass(n) { return n == null ? "" : (n === 0 ? "docks full" : "docks"); }

function statsHtml(d) {
  if (!d) return '<div class="stat" style="flex:1;padding:20px;text-align:center"><span style="font-size:0.85rem;color:#ef4444">Could not load — check connection</span></div>';
  var dockLbl = d.total != null ? "Free / " + d.total : "Free Docks";
  return '<div class="stat"><span class="stat-value ' + bikeClass(d.bikes) + '">' + (d.bikes != null ? d.bikes : "?") + '</span><div class="stat-label">🚲 Bikes</div></div>' +
         '<div class="stat"><span class="stat-value ebikes">' + (d.ebikes != null ? d.ebikes : "?") + '</span><div class="stat-label">⚡ E-Bikes</div></div>' +
         '<div class="stat"><span class="stat-value ' + dockClass(d.docks) + '">' + (d.docks != null ? d.docks : "?") + '</span><div class="stat-label">🅿 ' + dockLbl + '</div></div>';
}
function loadingHtml() {
  return '<div class="stat"><span class="stat-value loading-val">…</span><div class="stat-label">🚲 Bikes</div></div>' +
         '<div class="stat"><span class="stat-value loading-val">…</span><div class="stat-label">⚡ E-Bikes</div></div>' +
         '<div class="stat"><span class="stat-value loading-val">…</span><div class="stat-label">🅿 Free Docks</div></div>';
}

// Fetch single station
function fetchStation(id) {
  return fetch(API_SINGLE + id, { cache: "no-store" })
    .then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(function(data) {
      var props = data.additionalProperties || [];
      function gv(key) { var p = props.find(function(p){ return p.key === key; }); return p ? parseInt(p.value, 10) : null; }
      return { bikes: gv("NbBikes"), ebikes: gv("NbEBikes"), docks: gv("NbEmptyDocks"), total: gv("NbDocks") };
    })
    .catch(function() { return null; });
}

// Card HTML
function cardHtml(station) {
  var ec = editMode ? " edit-mode" : "";
  var drag = editMode ? "true" : "false";
  return '<div class="card' + ec + '" id="card-' + station.id + '" draggable="' + drag + '"' +
    ' ondragstart="onDragStart(event,' + station.id + ')"' +
    ' ondragover="onDragOver(event)"' +
    ' ondragleave="onDragLeave(event)"' +
    ' ondrop="onDrop(event,' + station.id + ')"' +
    ' ondragend="onDragEnd(event)">' +
    '<button class="remove-btn" onclick="removeStation(' + station.id + ')">✕</button>' +
    '<div class="drag-handle" onpointerdown="startTouchDrag(event,' + station.id + ')">⠿</div>' +
    '<div class="card-header">' +
      '<div class="station-name">' + station.label + '</div>' +
      '<div class="station-area">' + station.area + '</div>' +
    '</div>' +
    '<div class="stats-row" id="stats-' + station.id + '">' + loadingHtml() + '</div>' +
    '<div class="actions">' +
      '<a class="action-btn" href="' + cycleUrl(station.lat, station.lng) + '" target="_blank">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>' +
        'Cycle Here' +
      '</a>' +
    '</div>' +
  '</div>';
}

// Load all
function loadAll() {
  var refreshBtn = document.getElementById("refresh-btn");
  refreshBtn.disabled = true; refreshBtn.textContent = "…";
  var favs = getFavourites();
  var grid = document.getElementById("grid");
  var empty = document.getElementById("empty-state");
  if (!favs.length) {
    grid.innerHTML = "";
    empty.classList.add("show");
    refreshBtn.disabled = false; refreshBtn.textContent = "↺";
    document.getElementById("status-bar").textContent = "";
    return;
  }
  empty.classList.remove("show");
  grid.innerHTML = favs.map(cardHtml).join("");
  Promise.all(favs.map(function(station) {
    return fetchStation(station.id).then(function(d) {
      var el = document.getElementById("stats-" + station.id);
      if (el) el.innerHTML = statsHtml(d);
    });
  })).then(function() {
    var t = new Date().toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
    document.getElementById("status-bar").textContent = "Updated " + t;
    refreshBtn.disabled = false; refreshBtn.textContent = "↺";
  });
}

// Edit mode
function toggleEdit() {
  editMode = !editMode;
  var btn = document.getElementById("edit-btn");
  var banner = document.getElementById("edit-banner");
  btn.classList.toggle("active", editMode);
  btn.textContent = editMode ? "✓ Done" : "✏️ Edit";
  banner.classList.toggle("show", editMode);
  document.querySelectorAll(".card").forEach(function(c) {
    c.classList.toggle("edit-mode", editMode);
    c.setAttribute("draggable", editMode ? "true" : "false");
  });
}

function removeStation(id) {
  removeFav(id);
  var card = document.getElementById("card-" + id);
  if (card) {
    card.style.transition = "opacity 0.2s,transform 0.2s";
    card.style.opacity = "0";
    card.style.transform = "scale(0.88)";
    setTimeout(function(){ loadAll(); }, 210);
  }
  refreshPinButtons();
}

// Drag (mouse)
var dragId = null;
function onDragStart(e, id) {
  if (!editMode) { e.preventDefault(); return; }
  dragId = id;
  e.dataTransfer.effectAllowed = "move";
  setTimeout(function(){ var el = document.getElementById("card-" + id); if (el) el.classList.add("dragging"); }, 0);
}
function onDragOver(e) { if (!editMode || dragId === null) return; e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
function onDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
function onDrop(e, targetId) {
  e.preventDefault(); e.currentTarget.classList.remove("drag-over");
  if (dragId === null || dragId === targetId) return;
  reorder(dragId, targetId);
}
function onDragEnd() {
  dragId = null;
  document.querySelectorAll(".card").forEach(function(c){ c.classList.remove("dragging","drag-over"); });
}

// Drag (touch)
var touchDragId = null, touchTarget = null;
function startTouchDrag(e, id) {
  if (!editMode) return;
  e.preventDefault();
  touchDragId = id;
  document.getElementById("card-" + id).style.opacity = "0.4";
  document.addEventListener("pointermove", onPointerMove, { passive: true });
  document.addEventListener("pointerup", onPointerUp);
}
function onPointerMove(e) {
  if (touchDragId === null) return;
  var el = document.elementFromPoint(e.clientX, e.clientY);
  var card = el ? el.closest(".card") : null;
  document.querySelectorAll(".card").forEach(function(c){ c.classList.remove("drag-over"); });
  if (card) {
    var tid = parseInt(card.id.replace("card-",""), 10);
    touchTarget = (tid !== touchDragId) ? tid : null;
    if (touchTarget) card.classList.add("drag-over");
  } else { touchTarget = null; }
}
function onPointerUp() {
  document.removeEventListener("pointermove", onPointerMove);
  document.removeEventListener("pointerup", onPointerUp);
  document.querySelectorAll(".card").forEach(function(c){ c.classList.remove("drag-over"); });
  var card = document.getElementById("card-" + touchDragId);
  if (card) card.style.opacity = "";
  if (touchTarget !== null && touchTarget !== touchDragId) reorder(touchDragId, touchTarget);
  touchDragId = null; touchTarget = null;
}

function reorder(fromId, toId) {
  var favs = getFavourites();
  var fi = favs.findIndex(function(s){ return s.id === fromId; });
  var ti = favs.findIndex(function(s){ return s.id === toId; });
  if (fi === -1 || ti === -1) return;
  var moved = favs.splice(fi, 1)[0];
  favs.splice(ti, 0, moved);
  saveFavourites(favs);
  loadAll();
}

// Search
function toggleSearch() {
  searchOpen = !searchOpen;
  var panel = document.getElementById("search-panel");
  var btn = document.getElementById("search-toggle-btn");
  panel.classList.toggle("open", searchOpen);
  btn.classList.toggle("active", searchOpen);
  btn.textContent = searchOpen ? "✕ Close" : "🔍 Search";
  if (searchOpen) { setTimeout(function(){ document.getElementById("search-input").focus(); }, 80); }
  else { document.getElementById("search-results").innerHTML = ""; document.getElementById("search-msg").textContent = ""; document.getElementById("search-input").value = ""; }
}

function doSearch() {
  var q = document.getElementById("search-input").value.trim();
  if (!q) return;
  var sbtn = document.getElementById("search-btn");
  var msg  = document.getElementById("search-msg");
  var res  = document.getElementById("search-results");
  sbtn.disabled = true; sbtn.textContent = "…";
  msg.textContent = "Searching…"; res.innerHTML = "";

  fetch(API_SEARCH + encodeURIComponent(q))
    .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(data) {
      if (!data.length) { msg.textContent = "No stations found — try a nearby street name."; sbtn.disabled = false; sbtn.textContent = "Go"; return; }
      msg.textContent = data.length + " station" + (data.length !== 1 ? "s" : "") + " found";

      Promise.all(data.map(function(s) {
        var numId = parseInt(s.id.replace("BikePoints_",""), 10);
        return fetchStation(numId);
      })).then(function(liveResults) {
        res.innerHTML = data.map(function(s, i) {
          var numId = parseInt(s.id.replace("BikePoints_",""), 10);
          var lat = s.lat, lng = s.lon;
          var parts = (s.commonName || s.id).split(",");
          var label = parts[0].trim();
          var area  = parts.slice(1).join(",").trim();
          var already = isFav(numId);
          var d = liveResults[i];
          var bikes  = d ? d.bikes  : null;
          var ebikes = d ? d.ebikes : null;
          var docks  = d ? d.docks  : null;
          var total  = d ? d.total  : null;
          // Store station data in a global map so onclick can retrieve it safely
          window._searchResults = window._searchResults || {};
          window._searchResults[numId] = { id: numId, label: label, area: area, lat: lat, lng: lng };
          return '<div class="result-card" id="result-' + numId + '">' +
            '<div class="result-header"><div>' +
              '<div class="result-name">' + label + '</div>' +
              (area ? '<div class="result-area">' + area + '</div>' : '') +
            '</div>' +
            '<button class="pin-btn" id="pin-' + numId + '" onclick="pinStation(' + numId + ')" ' + (already ? 'disabled' : '') + '>' +
              (already ? '✓ Saved' : '＋ Save') +
            '</button></div>' +
            '<div class="result-stats">' +
              '<div class="result-stat"><span class="result-stat-val ' + bikeClass(bikes) + '">' + (bikes != null ? bikes : "?") + '</span><div class="result-stat-lbl">🚲 Bikes</div></div>' +
              '<div class="result-stat"><span class="result-stat-val ebikes">' + (ebikes != null ? ebikes : "?") + '</span><div class="result-stat-lbl">⚡ E-Bikes</div></div>' +
              '<div class="result-stat"><span class="result-stat-val ' + dockClass(docks) + '">' + (docks != null ? docks : "?") + '</span><div class="result-stat-lbl">🅿 Free' + (total ? " / " + total : "") + '</div></div>' +
            '</div></div>';
        }).join("");
        sbtn.disabled = false; sbtn.textContent = "Go";
      });
    })
    .catch(function() { msg.textContent = "Search failed — check your connection."; sbtn.disabled = false; sbtn.textContent = "Go"; });
}

function pinStation(id) {
  var station = (window._searchResults || {})[id];
  if (!station) return;
  addFav(station);
  var btn = document.getElementById("pin-" + id);
  if (btn) { btn.textContent = "✓ Saved"; btn.disabled = true; }
  loadAll();
}

function refreshPinButtons() {
  document.querySelectorAll("[id^='pin-']").forEach(function(btn) {
    var id = parseInt(btn.id.replace("pin-",""), 10);
    var fav = isFav(id);
    btn.textContent = fav ? "✓ Saved" : "＋ Save";
    btn.disabled = fav;
  });
}

loadAll();
setInterval(loadAll, 3 * 60 * 1000);
</script>
</body>
</html>
